[build]
target = "x86_64-osirs.json"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true

[target.'cfg(target_os = "none")']
runner = "qemu-system-x86_64 -device isa-debug-exit,iobase=0xf4,iosize=0x04 -no-reboot -drive format=raw,file=target/x86_64-osirs/debug/bootimage-osirs.bin -pidfile"
